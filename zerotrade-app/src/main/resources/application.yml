spring:
  application:
    name: zerotrade-ai

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/zerotrade
    username: ${DB_USERNAME:zerotrade}
    password: ${DB_PASSWORD:zerotrade}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-20250514
          max-tokens: 4096
          temperature: 0.3

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=5m

# Zerodha Config
zerodha:
  api-key: ${ZERODHA_API_KEY}
  api-secret: ${ZERODHA_API_SECRET}
  user-id: ${ZERODHA_USER_ID}
  totp-secret: ${ZERODHA_TOTP_SECRET}
  redirect-url: ${ZERODHA_REDIRECT_URL:http://localhost:8080/api/v1/auth/callback}
  postback-url: ${ZERODHA_POSTBACK_URL:https://localhost:8080/api/v1/webhooks/orders}

# Agent Config
agents:
  signal-analysis:
    interval-minutes: 5
  news-scan:
    trading-hours-interval-minutes: 180  # every 3 hours
    daily-scan-time: "08:00"
  daily-analysis:
    time: "08:30"

# Trading Config
trading:
  market-open: "09:15"
  market-close: "15:30"
  pre-market-start: "09:00"
  commodity-close: "23:30"
  max-trades-per-day: 50
  max-position-size-percent: 5.0
  default-stop-loss-percent: 2.0

# Server Config
server:
  port: ${SERVER_PORT:8080}
